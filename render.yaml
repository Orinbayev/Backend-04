services:
  - type: web
    name: backend-04
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backend-04.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
