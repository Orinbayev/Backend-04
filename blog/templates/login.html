{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 24px;
        }

        .title h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
        }

        .title p {
            color: #64748b;
            margin-top: 6px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2563eb;
        }

        .errorlist {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            list-style: none;
        }

        .btn {
            margin-top: 10px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .bottom {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #64748b;
        }

        .bottom a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }

        .bottom a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                padding: 24px;
            }

            .title h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">
        <h1>Kirish</h1>
        <p>Akkauntingizga kiring</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <!-- Username -->
        <div>
            <label>Foydalanuvchi nomi</label>
            {{ form.username }}
            {{ form.username.errors }}
        </div>

        <!-- Password -->
        <div>
            <label>Parol</label>
            {{ form.password }}
            {{ form.password.errors }}
        </div>

        <!-- General errors -->
        {{ form.non_field_errors }}

        <button type="submit" class="btn">Kirish</button>
    </form>

    <div class="bottom">
        Akkauntingiz yo‘qmi? 
        <a href="/register/">Ro‘yxatdan o‘tish</a>
    </div>
</div>

</body>
</html>
